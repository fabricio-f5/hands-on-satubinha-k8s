name: "Reusable — Terragrunt Layer with Saved Plan"

on:
  workflow_call:
    inputs:
      layer:
        required: true
        type: string
      environment:
        required: true
        type: string
      action:
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.10.0
  TG_VERSION: 0.66.9

jobs:
  layer:
    name: "${{ inputs.environment }} - ${{ inputs.layer }} (${{ inputs.action }})"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then ARCH_TYPE="amd64"; else ARCH_TYPE="arm64"; fi
          curl -Lo terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_${ARCH_TYPE}"
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/
          terragrunt --version

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      # ------------------------------------------------------------
      # Terragrunt Plan com arquivo salvo
      # ------------------------------------------------------------
      - name: Terragrunt Plan (save plan)
        if: ${{ inputs.action == 'plan' }}
        working-directory: environments/${{ inputs.environment }}/${{ inputs.layer }}
        run: |
          echo "Gerando plano salvo..."
          terragrunt --terragrunt-non-interactive plan -out=tfplan

      - name: Terragrunt Show Plan
        if: ${{ inputs.action == 'plan' }}
        working-directory: environments/${{ inputs.environment }}/${{ inputs.layer }}
        run: terragrunt --terragrunt-non-interactive show -no-color tfplan

      # ------------------------------------------------------------
      # Terragrunt Apply usando o plano salvo
      # ------------------------------------------------------------
      - name: Terragrunt Apply Saved Plan
        if: ${{ inputs.action == 'apply' }}
        working-directory: environments/${{ inputs.environment }}/${{ inputs.layer }}
        run: |
          echo "Aplicando ${{ inputs.layer }} do ${{ inputs.environment }} usando plano salvo..."
          # Remove variáveis TF_VAR que poderiam conflitar
          unset TF_VAR_public_subnet_cidrs
          unset TF_VAR_private_subnet_cidrs
          unset TF_VAR_availability_zones
          terragrunt run-all apply -auto-approve tfplan

      - name: Terragrunt Output
        if: ${{ inputs.action == 'apply' }}
        working-directory: environments/${{ inputs.environment }}/${{ inputs.layer }}
        run: terragrunt --terragrunt-non-interactive output -json