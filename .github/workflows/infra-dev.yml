name: "[Dev] Infra"
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Acção a executar'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - plan_destroy
          - destroy

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: satubinha-dev
  KUBECTL_VERSION: 1.27.3
  TG_VERSION: 0.66.9
  TF_VERSION: 1.9.8
  HELM_VERSION: 3.14.0

jobs:
  network:
    uses: ./.github/workflows/_terragrunt-layer.yml
    with:
      layer: network
      environment: dev
      action: ${{ inputs.action }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  eks:
    needs: network
    uses: ./.github/workflows/_terragrunt-layer.yml
    with:
      layer: eks
      environment: dev
      action: ${{ inputs.action }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  install-cluster-components:
    needs: eks
    if: ${{ inputs.action == 'apply' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          TG_VERSION="${{ env.TG_VERSION }}"
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            ARCH_TYPE="amd64"
          elif [ "$ARCH" = "aarch64"  ] || [ "$ARCH" = "arm64" ]; then
            ARCH_TYPE="arm64"
          else
            echo "Unsupported architecture: $ARCH"
            exit 1
          fi
          curl -Lo terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_${ARCH_TYPE}"
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Setup kubectl
        run: |
          KUBECTL_VERSION="${{ env.KUBECTL_VERSION }}"
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            ARCH_TYPE="amd64"
          elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            ARCH_TYPE="arm64"
          else
            echo "Unsupported architecture: $ARCH"
            exit 1
          fi
          curl -Lo kubectl "https://dl.k8s.io/release/v${KUBECTL_VERSION}/bin/linux/${ARCH_TYPE}/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Wait for EKS cluster
        run: |
          echo "Aguardando cluster EKS ficar ativo..."
          aws eks wait cluster-active \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}
          echo "Cluster ativo!"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Setup Helm
        run: |
          HELM_VERSION="${{ env.HELM_VERSION }}"
          curl -Lo helm.tar.gz "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz"
          tar -zxvf helm.tar.gz
          sudo mv linux-amd64/helm /usr/local/bin/
          helm version

      - name: Install Secrets Store CSI Driver
        run: |
          helm repo add secrets-store-csi-driver https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
          helm repo update

          helm upgrade --install csi-secrets-store secrets-store-csi-driver/secrets-store-csi-driver \
            --namespace kube-system \
            --set syncSecret.enabled=true \
            --set enableSecretRotation=true \
            --set rotationPollInterval=2m

          kubectl rollout status daemonset/csi-secrets-store \
            -n kube-system \
            --timeout=120s

      - name: Install AWS Provider
        run: |
          kubectl apply -f https://raw.githubusercontent.com/aws/secrets-store-csi-driver-provider-aws/main/deployment/aws-provider-installer.yaml

          kubectl rollout status daemonset/csi-secrets-store-provider-aws \
            -n kube-system \
            --timeout=120s

      - name: Install EBS CSI Driver
        run: |
          EBS_CSI_ROLE_ARN=$(cd environments/dev/eks && terragrunt output -raw ebs_csi_driver_role_arn)

          kubectl apply -k "github.com/kubernetes-sigs/aws-ebs-csi-driver/deploy/kubernetes/overlays/stable/?ref=release-1.27"

          kubectl rollout status deployment/ebs-csi-controller \
            -n kube-system \
            --timeout=120s

          kubectl annotate serviceaccount ebs-csi-controller-sa \
            -n kube-system \
            eks.amazonaws.com/role-arn=${EBS_CSI_ROLE_ARN} \
            --overwrite

          kubectl rollout restart deployment/ebs-csi-controller \
            -n kube-system

      - name: Install ALB Controller
        run: |
          ALB_ROLE_ARN=$(cd environments/dev/eks && terragrunt output -raw alb_controller_role_arn)

          helm repo add eks https://aws.github.io/eks-charts
          helm repo update

          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName=${{ env.CLUSTER_NAME }} \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${ALB_ROLE_ARN}

  app-infra:
    needs: install-cluster-components
    uses: ./.github/workflows/_terragrunt-layer.yml
    with:
      layer: app-infra
      environment: dev
      action: ${{ inputs.action }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}