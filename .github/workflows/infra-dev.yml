name: "[Dev] Infra"
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Acção a executar'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - plan_destroy
          - destroy

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: satubinha-dev
  KUBECTL_VERSION: 1.27.3

jobs:
  network:
    uses: ./.github/workflows/_terragrunt-layer.yml
    with:
      layer: network
      environment: dev
      action: ${{ inputs.action }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  eks:
    needs: network
    uses: ./.github/workflows/_terragrunt-layer.yml
    with:
      layer: eks
      environment: dev
      action: ${{ inputs.action }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  install-cluster-components:
    needs: eks
    if: ${{ inputs.action == 'apply' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Setup kubectl
        run: |
          KUBECTL_VERSION="${{ env.KUBECTL_VERSION }}"
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            ARCH_TYPE="amd64"
          elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            ARCH_TYPE="arm64"
          else
            echo "Unsupported architecture: $ARCH"
            exit 1
          fi
          curl -Lo kubectl "https://dl.k8s.io/release/v${KUBECTL_VERSION}/bin/linux/${ARCH_TYPE}/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Install Secrets Store CSI Driver
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/secrets-store-csi-driver/main/deploy/rbac-secretproviderclass.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/secrets-store-csi-driver/main/deploy/csidriver.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/secrets-store-csi-driver/main/deploy/secrets-store.csi.x-k8s.io_secretproviderclasses.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/secrets-store-csi-driver/main/deploy/secrets-store.csi.x-k8s.io_secretproviderclasspodstatuses.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/secrets-store-csi-driver/main/deploy/secrets-store-csi-driver.yaml

      - name: Install AWS Provider
        run: |
          kubectl apply -f https://raw.githubusercontent.com/aws/secrets-store-csi-driver-provider-aws/main/deployment/aws-provider-installer.yaml

  app-infra:
    needs: eks
    uses: ./.github/workflows/_terragrunt-layer.yml
    with:
      layer: app-infra
      environment: dev
      action: ${{ inputs.action }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}


  