name: "[Dev] Deploy"
on:
  push:
    branches:
      - main
  workflow_dispatch:
    
env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: satubinha
  KUBECTL_VERSION: 1.27.3
  TG_VERSION: 0.67.0
  TF_VERSION: 1.9.8

jobs:
  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: dev/deploy
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          TG_VERSION="${{ env.TG_VERSION }}"
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            ARCH_TYPE="amd64"
          elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            ARCH_TYPE="arm64"
          else
            echo "Unsupported architecture: $ARCH"
            exit 1
          fi        
          curl -L -o terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_${ARCH_TYPE}
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Setup kubectl
        run: |
          KUBECTL_VERSION="${{ env.KUBECTL_VERSION }}"
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            ARCH_TYPE="amd64"
          elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            ARCH_TYPE="arm64"
          else
            echo "Unsupported architecture: $ARCH"
            exit 1
          fi
          curl -Lo kubectl "https://dl.k8s.io/release/v${KUBECTL_VERSION}/bin/linux/${ARCH_TYPE}/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          kubectl version --client --short

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name satubinha-dev \
            --alias ${{ env.CLUSTER_NAME }}-dev

      - name: Get image tags
        run: |
          API_TAG=$(aws ssm get-parameter --name "/satubinha/images/api" --query "Parameter.Value" --output text)
          FRONT_TAG=$(aws ssm get-parameter --name "/satubinha/images/front" --query "Parameter.Value" --output text)
          MIGRATE_TAG=$(aws ssm get-parameter --name "/satubinha/images/migrate" --query "Parameter.Value" --output text)
          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "API_TAG=$API_TAG" >> $GITHUB_ENV
          echo "FRONT_TAG=$FRONT_TAG" >> $GITHUB_ENV
          echo "MIGRATE_TAG=$MIGRATE_TAG" >> $GITHUB_ENV
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV

      - name: Verify cluster access
        run: |
          kubectl get nodes --context ${{ env.CLUSTER_NAME }}-dev

      - name: Apply service account
        env:
          TF_VAR_db_user: ${{ secrets.DB_USER }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          APP_ROLE_ARN=$(cd environments/dev/app-infra && terragrunt output -raw app_role_arn)
          envsubst < k8s/dev/serviceaccount.yaml | kubectl apply -f - \
            --context ${{ env.CLUSTER_NAME }}-dev

      - name: Apply configmap
        run: |
          kubectl apply -f k8s/dev/configmap.yaml \
            --context ${{ env.CLUSTER_NAME }}-dev

      - name: Apply SecretProviderClass
        run: |
          kubectl apply -f k8s/dev/secretproviderclass.yaml \
            --context ${{ env.CLUSTER_NAME }}-dev

      - name: Create gp2-immediate storage class
        run: |
          kubectl apply -f - --context ${{ env.CLUSTER_NAME }}-dev <<EOF
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: gp2-immediate
          provisioner: kubernetes.io/aws-ebs
          parameters:
            type: gp2
          reclaimPolicy: Delete
          volumeBindingMode: Immediate
          allowVolumeExpansion: true
          EOF

      - name: Delete existing PVC
        run: |
          kubectl delete pvc postgres-pvc \
            --context ${{ env.CLUSTER_NAME }}-dev \
            --ignore-not-found=true

      - name: Apply PVC
        run: |
          kubectl apply -f k8s/dev/pvc.yaml \
            --context ${{ env.CLUSTER_NAME }}-dev

      - name: Apply DB deployment
        run: |
          kubectl apply -f k8s/dev/deployment-db.yaml \
            --context ${{ env.CLUSTER_NAME }}-dev

      - name: Wait for DB ready
        run: |
          kubectl rollout status deployment/db \
            --timeout=180s \
            --context ${{ env.CLUSTER_NAME }}-dev

      - name: Debug DB pod
        if: failure()
        run: |
          kubectl get pods -n default --context ${{ env.CLUSTER_NAME }}-dev
          kubectl describe pod -l app=db -n default --context ${{ env.CLUSTER_NAME }}-dev | tail -40
          kubectl logs -l app=db -n default --context ${{ env.CLUSTER_NAME }}-dev || true

      - name: Run migrations
        run: |
          envsubst < k8s/dev/job-migrate.yaml | kubectl apply -f - \
            --context ${{ env.CLUSTER_NAME }}-dev

      - name: Wait for migrations
        run: |
          kubectl wait --for=condition=complete job/migrate \
            --timeout=120s \
            --context ${{ env.CLUSTER_NAME }}-dev

      - name: Deploy application
        run: |
          envsubst < k8s/dev/deployment-api.yaml | kubectl apply -f - \
            --context ${{ env.CLUSTER_NAME }}-dev
          envsubst < k8s/dev/deployment-front.yaml | kubectl apply -f - \
            --context ${{ env.CLUSTER_NAME }}-dev
          kubectl apply -f k8s/dev/service.yaml \
            --context ${{ env.CLUSTER_NAME }}-dev
          kubectl apply -f k8s/dev/ingress.yaml \
            --context ${{ env.CLUSTER_NAME }}-dev